name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0). Leave empty to auto-bump patch version."
        required: false
        type: string

env:
  MACOSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: strip leading 'v' from tag
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            # Manual dispatch with version provided
            VERSION="${{ github.event.inputs.version }}"
          else
            # Manual dispatch without version: auto-bump patch
            CURRENT=$(jq -r '.version' editors/code/package.json)
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  create-release:
    name: Create Release
    needs: ["resolve-version"]
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          release_name: v${{ needs.resolve-version.outputs.version }}
          draft: true

  dist:
    needs: ["resolve-version", "create-release"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: luau-lsp-win64
            code-target: [win32-x64, win32-arm64]
          - os: ubuntu-22.04
            artifact-name: luau-lsp-linux-x86_64
            code-target: [linux-x64]
          - os: ubuntu-22.04-arm
            artifact-name: luau-lsp-linux-arm64
            code-target: [linux-arm64]
          - os: macos-latest
            artifact-name: luau-lsp-macos
            code-target: [darwin-x64, darwin-arm64]

    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set Version
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          jq ".version = \"$VERSION\"" editors/code/package.json > tmp.json && mv tmp.json editors/code/package.json
          sed -i.bak "s/set(LSP_VERSION .*/set(LSP_VERSION \"$VERSION\")/g" CMakeLists.txt

      - name: Build Server
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON -DLSP_STATIC_CRT:BOOL=ON
          cmake --build . --config RelWithDebInfo --target Luau.LanguageServer.CLI -j 3

      - name: (MacOS) Verify universal build
        if: matrix.os == 'macos-latest'
        run: lipo -archs build/luau-lsp

      - name: (MacOS) Strip debug symbols
        if: matrix.os == 'macos-latest'
        run: strip -S build/luau-lsp

      - name: (Linux) Strip debug symbols
        if: startsWith(matrix.os, 'ubuntu')
        run: objcopy --strip-debug build/luau-lsp

      - name: Copy Build into Extension
        shell: bash
        run: |
          mkdir -p ./dist
          mkdir -p editors/code/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp build/RelWithDebInfo/luau-lsp.exe editors/code/bin/server.exe
          else
            cp build/luau-lsp editors/code/bin/server
            chmod 777 editors/code/bin/server
          fi

      - name: Create Release Archive
        shell: bash
        run: |
          mkdir staging
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "build/RelWithDebInfo/luau-lsp.exe" staging/
            cd staging
            7z a ../dist/server.zip *
          else
            cp "build/luau-lsp" staging/
            cd staging
            zip ../dist/server.zip *
          fi

      - name: Copy README, CHANGELOG, LICENSE
        shell: bash
        run: |
          rm -f editors/code/README.md
          cp README.md editors/code/README.md
          rm -f editors/code/CHANGELOG.md
          cp CHANGELOG.md editors/code/CHANGELOG.md
          rm -f editors/code/LICENSE.md
          cp LICENSE.md editors/code/LICENSE

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.artifact-name }}
          path: ./dist

      - name: Upload Server to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./dist/server.zip
          asset_name: ${{ matrix.artifact-name }}.zip
          asset_content_type: application/octet-stream

      - run: npm ci
        working-directory: editors/code

      - name: Publish Extension
        working-directory: editors/code
        run: npx @vscode/vsce publish --pat ${{ secrets.MARKETPLACE_TOKEN }} --target ${{ join(matrix.code-target, ' ') }}
